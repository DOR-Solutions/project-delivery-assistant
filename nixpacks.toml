[phases.setup]
nixPkgs = ["python311", "nodejs_20", "gcc", "bash"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r backend/requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "bash ./start.sh"
